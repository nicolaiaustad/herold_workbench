<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0a; font-family: system-ui, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      background: rgba(0,0,0,0.7);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      pointer-events: none;
    }
    #controls {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #888;
      background: rgba(0,0,0,0.7);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="info">
    <strong>Architecture Visualizer</strong><br>
    <span id="node-count">Loading...</span>
  </div>
  <div id="controls">
    Left click + drag: Rotate • Right click + drag: Pan • Scroll: Zoom
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
